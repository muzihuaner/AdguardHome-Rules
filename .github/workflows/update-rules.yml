name: 激进的规则

permissions:
  contents: write

on:
  push:
    branches:
      - radical
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: radical
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script to process rules and update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: radical
          OUTPUT_BLOCK_FILENAME: radical-Black.txt
          OUTPUT_WHITE_FILENAME: radical-White.txt
          README_TITLE: 激进的规则
        run: python documents/process_rules.py

      - name: Commit and push if changes
        env:
          BLOCK_FILE: radical-Black.txt
          WHITE_FILE: radical-White.txt
        run: \vert{}
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git add "$BLOCK_FILE" "$WHITE_FILE" README.md

          BLOCK_COUNT=$(grep -v -c '^!' "$BLOCK_FILE" || echo 0)
          WHITE_COUNT=$(grep -v -c '^!' "$WHITE_FILE" || echo 0)

          git commit -m "chore: 自动更新规则列表 (radical)" \
                     -m "黑名单规则: ${BLOCK_COUNT} 条" \
                     -m "白名单规则: ${WHITE_COUNT} 条"

          git push origin "HEAD:radical"
