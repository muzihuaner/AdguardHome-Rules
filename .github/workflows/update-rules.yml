name: 激进的规则

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - radical
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script to process rules and update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python documents/process_rules.py

      - name: Commit and push if changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git add radical-Black.txt radical-White.txt README.md

          BLOCK_COUNT=$(grep -v -c '^!' radical-Black.txt || echo 0)
          WHITE_COUNT=$(grep -v -c '^!' radical-White.txt || echo 0)

          git commit -m "chore: 自动更新规则列表 (branch: ${{ github.ref_name }})" \
                     -m "黑名单规则: ${BLOCK_COUNT} 条" \
                     -m "白名单规则: ${WHITE_COUNT} 条"

          git push origin "HEAD:${{ github.ref_name }}"
