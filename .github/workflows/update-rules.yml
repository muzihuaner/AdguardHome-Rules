name: 平稳的规则

permissions:
  contents: write

on:
  # 定时更新已由 main 分支的矩阵任务统一执行
  workflow_dispatch:

jobs:
  build-and-commit-radical:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (radical)
        uses: actions/checkout@v4
        with:
          ref: radical
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script to build lists and update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: radical
          OUTPUT_BLOCK_FILENAME: radical-Black.txt
          OUTPUT_WHITE_FILENAME: radical-White.txt
          README_TITLE: 激进的规则
          RELEASE_TAG: radical-latest
        run: python documents/process_rules.py

      - name: Upload lists to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: radical-latest
          name: "激进的规则 Latest"
          makeLatest: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "radical-Black.txt,radical-White.txt"

      - name: Commit and push README only
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi

          BLOCK_COUNT=$(grep -v -c '^!' radical-Black.txt \vert{}\vert{} echo 0)
          WHITE_COUNT=$(grep -v -c '^!' radical-White.txt || echo 0)

          git commit -m "chore: 更新 README (radical)" \
                     -m "黑名单规则: ${BLOCK_COUNT} 条" \
                     -m "白名单规则: ${WHITE_COUNT} 条"

          git push origin "HEAD:radical"
