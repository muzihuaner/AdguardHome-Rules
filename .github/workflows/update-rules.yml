name: 激进的规则

permissions:
  contents: write

on:
  push:
    branches:
      - radical
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-commit-radical:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-radical
      cancel-in-progress: true

    steps:
      - name: Checkout repository (radical)
        uses: actions/checkout@v4
        with:
          ref: radical
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: \vert{}
          python -m pip install --upgrade pip
          pip install requests

      - name: Build lists and update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: radical
          OUTPUT_BLOCK_FILENAME: radical-Black.txt
          OUTPUT_WHITE_FILENAME: radical-White.txt
          README_TITLE: 激进的规则
          RELEASE_TAG: radical-latest
        run: python documents/process_rules.py

      - name: Upload lists to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: radical-latest
          name: "激进的规则 Latest"
          makeLatest: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "radical-Black.txt,radical-White.txt"

      - name: Commit and push README only (safe rebase)
        run: \vert{}
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          git fetch origin radical
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git pull --rebase origin radical \vert{}\vert{} true

          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi

          BLOCK_COUNT=$(grep -v -c '^!' radical-Black.txt || echo 0)
          WHITE_COUNT=$(grep -v -c '^!' radical-White.txt \vert{}\vert{} echo 0)

          git commit -m "chore: 更新 README (radical)" \
                     -m "黑名单规则: ${BLOCK_COUNT} 条" \
                     -m "白名单规则: ${WHITE_COUNT} 条"

          git fetch origin radical
          git pull --rebase origin radical || true

          git push origin "HEAD:radical" || {
            echo "First push failed, attempting with --force-with-lease"
            git push --force-with-lease origin "HEAD:radical"
          }
