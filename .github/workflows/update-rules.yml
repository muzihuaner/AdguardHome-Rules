name: 平稳的规则

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-commit-main:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-main
      cancel-in-progress: true

    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build lists and update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
          OUTPUT_BLOCK_FILENAME: Black.txt
          OUTPUT_WHITE_FILENAME: White.txt
          README_TITLE: 平稳的规则
          RELEASE_TAG: stable-latest
        run: python documents/process_rules.py

      - name: Compute Beijing time for release title
        id: time
        run: |
          echo "cn_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S (UTC+8)')" >> $GITHUB_OUTPUT

      - name: Upload lists to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: stable-latest
          name: "平稳的规则 ${{ steps.time.outputs.cn_time }}"
          makeLatest: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "Black.txt,White.txt"

      - name: Commit and push README only (safe rebase)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          git fetch origin main
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git pull --rebase origin main || true

          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi

          BLOCK_COUNT=$(grep -v -c '^!' Black.txt || echo 0)
          WHITE_COUNT=$(grep -v -c '^!' White.txt || echo 0)

          git commit -m "chore: 更新 README (main)" \
                     -m "黑名单规则: ${BLOCK_COUNT} 条" \
                     -m "白名单规则: ${WHITE_COUNT} 条"

          git fetch origin main
          git pull --rebase origin main || true

          git push origin "HEAD:main" || {
            echo "First push failed, attempting with --force-with-lease"
            git push --force-with-lease origin "HEAD:main"
          }
